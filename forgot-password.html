<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LifeLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            background: var(--light-gray);
        }

        .auth-illustration {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-illustration::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M30,10L50,30L70,10L90,30L70,50L90,70L70,90L50,70L30,90L10,70L30,50L10,30L30,10Z" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.3;
            animation: float 25s linear infinite;
        }

        .auth-illustration img {
            max-width: 80%;
            height: auto;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        .auth-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .auth-header p {
            color: var(--gray-color);
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark-color);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            background-color: #f9f9f9;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1);
            background-color: white;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-color);
        }

        .input-icon input {
            padding-left: 45px;
        }

        .btn-reset {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-color);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }

        @media (max-width: 992px) {
            .auth-illustration {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-illustration">
            <img src="images/blood-donation-illustration.svg" alt="Blood Donation">
        </div>
        <div class="auth-content">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Forgot Password</h1>
                    <p>Enter your email and we'll send you a reset link</p>
                </div>

                <form id="forgotPasswordForm" novalidate>
                    <div class="form-group">
                        <label for="forgot-email">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="forgot-email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="error-message" id="forgot-email-error">Please enter a valid email address</div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-reset">Send Reset Link</button>

                    <div class="auth-footer">
                        Remembered your password? <a href="login.html">Back to login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('forgotPasswordForm');
            const emailInput = document.getElementById('forgot-email');
            const errorEl = document.getElementById('forgot-email-error');

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(String(email).toLowerCase());
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = emailInput.value.trim();
                if (!email || !validateEmail(email)) {
                    errorEl.textContent = 'Please enter a valid email address';
                    errorEl.style.display = 'block';
                    return;
                }

                errorEl.style.display = 'none';

                try {
                    // Optional: call backend if endpoint exists
                    // const response = await fetch('http://localhost:8000/api/auth/forgot-password', {
                    //     method: 'POST',
                    //     headers: { 'Content-Type': 'application/json' },
                    //     body: JSON.stringify({ email })
                    // });
                    // if (!response.ok) throw new Error('Failed to send reset email');

                    alert('If an account exists for ' + email + ', a password reset link has been sent.');
                    form.reset();
                } catch (err) {
                    alert('Unable to send reset email right now. Please try again later.');
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
